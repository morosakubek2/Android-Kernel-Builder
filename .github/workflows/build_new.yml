name: "Build Kernel"
env:
  OUT_DIR: "${{ github.workspace }}/out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-22.04
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          jq -s '[.[][]]' repos/repos*.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build Kernel"
    runs-on: ubuntu-22.04
    needs: Set-repos
    strategy:
      max-parallel: 4
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      KERNEL_NAME: ${{ matrix.repos.kernelSource.name }}
      KERNEL_REPO: ${{ matrix.repos.kernelSource.repo }}
      KERNEL_BRANCH: ${{ matrix.repos.kernelSource.branch }}
      DEFCONFIG: ${{ matrix.repos.kernelSource.defconfig }}

    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3
        with:
          path: "builder"

      - name: "📦 Install Dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev lld llvm curl git wget zip unzip tar jq gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi build-essential libelf-dev dwarves

      - name: "🌟 Clone Kernel Source"
        run: |
          git clone --recursive --depth=1 -j $(nproc) --branch "${KERNEL_BRANCH}" "${KERNEL_REPO}" kernel_source

      - name: "🔧 Download & Setup Toolchain"
        env:
          TOOLCHAINS: ${{ toJSON(matrix.repos.toolchains) }}
        run: |
          echo "Parsing toolchains..."
          # Sprawdź czy to tablica czy obiekt
          if echo "$TOOLCHAINS" | jq -e 'type == "object"' >/dev/null 2>&1; then
             TOOLCHAINS=$(echo "[$TOOLCHAINS]" | jq '.')
          fi

          COUNT=$(echo "$TOOLCHAINS" | jq 'length')
          echo "Found $COUNT toolchain(s)"

          for (( i=0; i<COUNT; i++ )); do
            NAME=$(echo "$TOOLCHAINS" | jq -r ".[$i].name")
            URL=$(echo "$TOOLCHAINS" | jq -r ".[$i].url // empty")
            
            echo "Setup toolchain: $NAME"
            DIR="${{ github.workspace }}/toolchains/$NAME"
            mkdir -p "$DIR"

            if [[ -n "$URL" && "$URL" != "null" ]]; then
              echo "Downloading from URL: $URL"
              FILENAME=$(basename "$URL")
              wget -q "$URL" -O "/tmp/$FILENAME"
              # Rozpakuj, usuwając główny folder jeśli istnieje
              tar -xzf "/tmp/$FILENAME" -C "$DIR" --strip-components=1 2>/dev/null || \
              tar -xzf "/tmp/$FILENAME" -C "$DIR"
              rm -f "/tmp/$FILENAME"
            else
              echo "Error: No URL provided for $NAME"
              exit 1
            fi

            # Dodaj bin do PATH
            if [[ -d "$DIR/bin" ]]; then
              echo "$DIR/bin" >> $GITHUB_PATH
              echo "✅ Added $DIR/bin to PATH"
            else
              echo "⚠️ Warning: bin directory not found in $DIR"
            fi
          done

      - name: "🔍 Verify Toolchain"
        run: |
          echo "--- Checking Compiler ---"
          which clang
          clang --version | head -n 3
          echo "--- Checking PATH ---"
          echo $PATH

      - name: "🔨 Build Kernel"
        working-directory: kernel_source
        env:
          PARAMS: ${{ toJSON(matrix.repos.params) }}
          DEFCONFIG: ${{ matrix.repos.kernelSource.defconfig }}
        run: |
          echo "=== Resolving Custom Clang Path ==="
          # Bezpośrednia ścieżka do pobranego clang
          CLANG_BIN="${{ github.workspace }}/toolchains/zyc-clang/bin/clang"
          if [[ ! -x "$CLANG_BIN" ]]; then
            echo "❌ Error: Custom clang not found at $CLANG_BIN"
            exit 1
          fi
          echo "✅ Using Clang: $CLANG_BIN"
          "$CLANG_BIN" --version | head -3

          ARCH=$(echo "$PARAMS" | jq -r '.ARCH // "arm64"')

          # 🔑 KLUCZOWE:
          # CC=$CLANG_BIN          -> wymusza użycie custom clang dla kernela
          # HOSTCC=clang           -> systemowy clang dla skryptów pomocniczych (scripts/)
          # GCC_TOOLCHAIN=         -> blokuje --gcc-toolchain=/usr
          # WERROR=0               -> omija HDRTEST strict mode
          CMD="make -j$(nproc) O=${{ github.workspace }}/out ARCH=${ARCH} CC=$CLANG_BIN HOSTCC=clang LLVM=1 LLVM_IAS=1 GCC_TOOLCHAIN= WERROR=0"

          if [[ $(echo "$PARAMS" | jq 'has("externalCommand")') == "true" ]]; then
             while read -r param; do
               KEY=$(echo "$param" | cut -d= -f1)
               VAL=$(echo "$param" | cut -d= -f2-)
               CMD="$CMD $KEY=$VAL"
             done < <(jq -r '.externalCommand | to_entries[] | "\(.key)=\(.value)"' <<< "$PARAMS")
          fi

          echo "🚀 Starting build..."
          make mrproper >/dev/null 2>&1 || true

          # 1. Defconfig
          eval "$CMD ${DEFCONFIG}"

          # 2. Pełna kompilacja
          eval "$CMD"

          echo "✅ Build finished."
          ls -l "${{ github.workspace }}/out/arch/${ARCH}/boot/Image.gz" 2>/dev/null || echo "⚠️ Image.gz not found"
