name: "Build Kernel (Direct & Clean)"
on: workflow_dispatch

jobs:
  build:
    name: "🐎 Build Kernel"
    runs-on: ubuntu-latest
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "📦 Install Dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev libelf-dev dwarves lld llvm curl git wget zip unzip tar jq build-essential

      - name: "🌟 Clone Kernel Source"
        run: |
          # Bezpieczne usuwanie spacji z JSON przy parsowaniu
          JSON=$(jq 'walk(if type == "string" then gsub(" "; "") else . end)' repos/repos.b2q.json | jq '.[0]')
          REPO=$(echo "$JSON" | jq -r '.kernelSource.repo')
          BRANCH=$(echo "$JSON" | jq -r '.kernelSource.branch')
          git clone --recursive --depth=1 -j $(nproc) --branch "$BRANCH" "$REPO" kernel

      - name: "🔧 Setup ZyCromerZ Clang"
        run: |
          JSON=$(jq 'walk(if type == "string" then gsub(" "; "") else . end)' repos/repos.b2q.json | jq '.[0]')
          URL=$(echo "$JSON" | jq -r '.toolchains[0].url')
          DIR="$HOME/zyc-clang"
          mkdir -p "$DIR"
          
          wget -q "$URL" -O /tmp/clang.tar.gz
          tar -xzf /tmp/clang.tar.gz -C "$DIR" --strip-components=1 2>/dev/null || tar -xzf /tmp/clang.tar.gz -C "$DIR"
          rm -f /tmp/clang.tar.gz

          # Jeśli powstał podfolder, przenieś zawartość wyżej
          if [ $(find "$DIR" -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l) -eq 1 ]; then
            mv "$DIR"/*/* "$DIR"/ 2>/dev/null || true
          fi
          
          echo "$DIR/bin" >> $GITHUB_PATH

      - name: "🔨 Build Kernel (Proven Flags)"
        working-directory: kernel
        run: |
          JSON=$(jq 'walk(if type == "string" then gsub(" "; "") else . end)' repos/repos.b2q.json | jq '.[0]')
          DEFCONFIG=$(echo "$JSON" | jq -r '.kernelSource.defconfig')
          OUT_DIR="${{ github.workspace }}/out"

          echo "✅ Compiler: $(which clang) | $(clang --version | head -1)"
          echo "📝 Config: $DEFCONFIG"

          # 🔑 CZYSTE FLAGI DLA ZYCROMERZ CLANG:
          # - Ignorujemy CROSS_COMPILE z JSON (wymusza systemowe GCC)
          # - LLVM=1 LLVM_IAS=1 = pełna kompilacja przez clang/llvm
          # - HOSTCC=clang = skrypty pomocnicze też przez clang (szybciej, mniej konfliktów)
          make -j$(nproc) O="$OUT_DIR" ARCH=arm64 CC=clang HOSTCC=clang LLVM=1 LLVM_IAS=1 "$DEFCONFIG"
          make -j$(nproc) O="$OUT_DIR" ARCH=arm64 CC=clang HOSTCC=clang LLVM=1 LLVM_IAS=1

          echo "✅ Build finished."
          ls -l "$OUT_DIR/arch/arm64/boot/Image.gz" 2>/dev/null || echo "⚠️ Image.gz not found"
