name: "Build kernels"

env:
  OUT_DIR: "${{ github.workspace }}/out"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
      builddate: ${{ steps.generate-builddate.outputs.builddate }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> ${GITHUB_OUTPUT}
          jq -s '[.[][]]' repos/repos*.json >> ${GITHUB_OUTPUT}
          echo "EOF" >> ${GITHUB_OUTPUT}
      - name: "⏰ Set builddate"
        id: generate-builddate
        run: echo "builddate=$(date +'%Y%m%d')" >> ${GITHUB_OUTPUT}

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 8
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      WORKSPACE: ${{ github.workspace }}

      builddate: "${{ needs.Set-repos.outputs.builddate }}"

      KERNEL_NAME: ${{ matrix.repos.kernelSource.name }}
      KERNEL_REPO: ${{ matrix.repos.kernelSource.repo }}
      KERNEL_BRANCH: ${{ matrix.repos.kernelSource.branch }}
      KERNEL_DEVICE: ${{ matrix.repos.kernelSource.device }}

      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.defconfig }}

      withKernelSU: ${{ matrix.repos.withKernelSU }}
      withSUSFS: ${{ matrix.repos.withSUSFS }}
      withLXC: ${{ matrix.repos.withLXC }}
      useAnykernel: ${{ matrix.repos.AnyKernel3.use }}
      release: ${{ matrix.repos.AnyKernel3.release }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3
        with:
          path: "repo"

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev libfl-dev lld llvm
          sudo apt-get install -y curl git ftp lftp wget libarchive-tools
          sudo apt-get install -y zip unzip tar gzip bzip2 rar unrar
          

      - name: "⏰ Setup Anykernel3"
        env:
          params: "${{ toJSON(matrix.repos.AnyKernel3) }}"
        run: |
          ANYKERNEL_REPO=$(echo ${params} | jq -r ".repo")
          ANYKERNEL_BRANCH=$(echo ${params} | jq -r ".branch")
          git clone --recursive --depth=1 -j $(nproc) --branch ${ANYKERNEL_BRANCH} ${ANYKERNEL_REPO} AnyKernel3

          echo "🤔 Setup Anykernel3 => (${ANYKERNEL_REPO})"

      - name: "🌟 Clone kernel source => (${{ env.KERNEL_REPO }})"
        id: clone-kernel
        run: |
          git clone --recursive --depth=1 -j $(nproc) --branch ${KERNEL_BRANCH} ${KERNEL_REPO} ${KERNEL_NAME}
          KERNEL_GIT_REF=$(git -C ${KERNEL_NAME} rev-parse --short HEAD)
          echo "KERNEL_GIT_REF=${KERNEL_GIT_REF}" >> ${GITHUB_OUTPUT}
          echo -e "\n⚠️ Kernel is at commit: ${KERNEL_GIT_REF}\n"

          echo "🤔 Clone kernel source => (${KERNEL_REPO})"

      - name: "💫 Get toolchains"
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          toolchains_num="$(echo ${toolchains} | jq 'length')"
          echo "🤔 There is ${toolchains_num} defined toolchains."
          for ((i=0;i<toolchains_num;i++)); do
            toolchain_name=$(echo ${toolchains} | jq -r ".[${i}].name")
            # Github
            toolchain_repo=$(echo ${toolchains} | jq -r ".[${i}].repo")
            toolchain_branch=$(echo ${toolchains} | jq -r ".[${i}].branch")
            # From archive
            toolchain_url=$(echo ${toolchains} | jq -r ".[${i}].url")

            echo ${toolchain_url}
            if [ -z "${toolchain_url:-}" ] || [ "${toolchain_url}" = "null" ];  then
              git clone --recursive --depth=1 -j $(nproc) --branch ${toolchain_branch} ${toolchain_repo} ${toolchain_name}
              echo "🤔 Clone ${toolchain_name} => (${toolchain_repo})"
            else
              wget -q "${toolchain_url}"
              filename="${toolchain_url##*/}"
              mkdir -p ${toolchain_name}
              case "${filename}" in
                *.zip)
                  unzip -d ${toolchain_name} "${filename}"
                  ;;
                *.tar)
                  tar xvf "${filename}" -C ${toolchain_name}
                  ;;
                *.tar.gz)
                  tar zxvf "${filename}" -C ${toolchain_name}
                  ;;
                *.rar)
                  unrar x "${filename}" ${toolchain_name}
                  ;;
                *)
                  echo "unknown file type: ${filename}"
                  ;;
              esac
            fi

            jq -r ".[${i}].binPath[] | tostring" <<< "${toolchains}" | while read -r bin_path; do
              echo "${WORKSPACE}/${toolchain_name}/${bin_path}" >> ${GITHUB_PATH}
            done
          done

      - name: "😎 Set args"
        id: generate-args
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
        run: |
          echo "🤔 PATH Variable: ${PATH}"

          ARCH=$(echo ${params} | jq -r ".ARCH")
          CC=$(echo ${params} | jq -r ".CC")

          args="-j$(nproc --all)"
          if [ -n "${{ env.OUT_DIR }}" ]; then
            mkdir -p ${{ env.OUT_DIR }} && args="${args} O=${{ env.OUT_DIR }}"
          fi
          if [ -n "${ARCH}" ]; then
            args="${args} ARCH=${ARCH}"
          fi
          if [ -n "${CC}" ]; then

            if [[ "${CC}" == *"/"* ]]; then
              CC=${{ env.WORKSPACE }}/${CC}
            fi

            args="${args} CC=${CC}"
          fi
          while read -r externalCommand; do
            key=$(echo "${externalCommand}" | cut -d= -f1)
            value=$(echo "${externalCommand}" | cut -d= -f2)
            if [[ "${value}" == *"/"* ]]; then
              value="${{ env.WORKSPACE }}/${value}"
            fi
            args="${args} ${key}=${value}"
          done < <(jq -r '.externalCommand | to_entries[] | "\(.key)=\(.value)"' <<< "${params}")

          echo "🤔 ${args}"
          echo "ARCH=${ARCH}" >> ${GITHUB_OUTPUT}
          echo "args=${args}" >> ${GITHUB_OUTPUT}

      - name: "😋 Integrate KernelSU Next"
        id: integrate-kernelsu-next
        working-directory: ${{ env.KERNEL_NAME }}
        env:
          arch: ${{ steps.generate-args.outputs.ARCH }}
        if: ${{ env.withKernelSU == 'true' }}
        run: |
          if [ -d "./KernelSU-Next" ]; then
            rm -rf "./KernelSU-Next"
          fi
          if [ -d "./drivers/kernelsu" ]; then
            rm -rf "./drivers/kernelsu"
          fi

          export KSU_UMOUNT_PATCH="https://github.com/tbyool/android_kernel_xiaomi_sm6150/commit/64db0dfa2f8aa6c519dbf21eb65c9b89643cda3d.patch"
          wget -qO- $KSU_UMOUNT_PATCH | patch -s -p1

          export KSU_GENERAL_PATCH="https://github.com/ximi-mojito-test/mojito_krenol/commit/8e25004fdc74d9bf6d902d02e402620c17c692df.patch"
          wget -qO- $KSU_GENERAL_PATCH | patch -s -p1

          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy_susfs

          KERNELSU_NEXT_VERSION=$(git -C KernelSU-Next describe --abbrev=0 --tags)
          KERNELSU_NEXT_GIT_REF=$(git -C KernelSU-Next rev-parse --short HEAD)
          echo "KERNELSU_NEXT_VERSION=${KERNELSU_NEXT_VERSION}" >> ${GITHUB_OUTPUT}
          echo "KERNELSU_NEXT_GIT_REF=${KERNELSU_NEXT_GIT_REF}" >> ${GITHUB_OUTPUT}
          echo -e "\n💡 KernelSU Next version: ${KERNELSU_NEXT_VERSION}\n"
          echo -e "\n💡 KernelSU Next ref: ${KERNELSU_NEXT_GIT_REF}\n"
          
          echo -e 'CONFIG_KSU=y' >> arch/${{ env.arch }}/configs/${{ env.DEFCONFIG_NAME }}
          echo -e 'KSU_MANUAL_HOOK=y' >> arch/${{ env.arch }}/configs/${{ env.DEFCONFIG_NAME }}

          cat arch/${{ env.arch }}/configs/${{ env.DEFCONFIG_NAME }}

      - name: "🥷 Add SUSFS patches"
        id: add-susfs-patches
        working-directory: ${{ env.KERNEL_NAME }}
        env:
          arch: ${{ steps.generate-args.outputs.ARCH }}
        if: ${{ env.withKernelSU == 'true' && env.withSUSFS == 'true' }}
        run: |

          if [ -d "./SUSFS" ]; then
            rm -rf "./SUSFS"
          fi

          export SILLY_SUSFS_PATCH="https://github.com/TheSillyOk/kernel_ls_patches/raw/refs/heads/master/susfs-2.1.0.patch"
          wget -qO- $SILLY_SUSFS_PATCH | patch -s -p1 --fuzz=5

          SUSFS_VERSION=$(grep -oP '^\s*#define\s+SUSFS_VERSION\s+"\K[^"]+' include/linux/susfs.h)
          echo -e "SUSFS_VERSION=${SUSFS_VERSION}" >> ${GITHUB_OUTPUT}
          echo -e "\n💡 SUSFS version: ${SUSFS_VERSION}\n"

          echo -e "CONFIG_KSU_SUSFS=y" >> arch/${{ env.arch }}/configs/${{ env.DEFCONFIG_NAME }}
          echo -e "CONFIG_KSU_SUSFS_SUS_PATH=y" >> arch/${{ env.arch }}/configs/${{ env.DEFCONFIG_NAME }}
          echo -e "CONFIG_KSU_SUSFS_SUS_MOUNT=n" >> arch/${{ env.arch }}/configs/${{ env.DEFCONFIG_NAME }}
          echo -e "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> arch/${{ env.arch }}/configs/${{ env.DEFCONFIG_NAME }}
          echo -e "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> arch/${{ env.arch }}/configs/${{ env.DEFCONFIG_NAME }}
          echo -e "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> arch/${{ env.arch }}/configs/${{ env.DEFCONFIG_NAME }}
          echo -e "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> arch/${{ env.arch }}/configs/${{ env.DEFCONFIG_NAME }}
          echo -e "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> arch/${{ env.arch }}/configs/${{ env.DEFCONFIG_NAME }}
          echo -e "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> arch/${{ env.arch }}/configs/${{ env.DEFCONFIG_NAME }}
          echo -e "CONFIG_KSU_SUSFS_SUS_MAP=y" >> arch/${{ env.arch }}/configs/${{ env.DEFCONFIG_NAME }}
          echo -e "CONFIG_KSU_SUSFS_TRY_UMOUNT=n" >> arch/${{ env.arch }}/configs/${{ env.DEFCONFIG_NAME }}

          cat arch/${{ env.arch }}/configs/${{ env.DEFCONFIG_NAME }}

      # TODO: maybe use this instead: https://github.com/tomxi1997/lxc-docker-support-for-android/
      - name: 🚢 Setup LXC docker
        working-directory: ${{ env.KERNEL_NAME }}
        env:
          arch: ${{ steps.generate-args.outputs.ARCH }}
          ADD_DEFCONFIG: ${{ env.WORKSPACE }}/repo/LXC/LXC_defconfig
        if: ${{ env.withLXC == 'true' }}
        run: |
          # Credits go to: https://github.com/DogDayAndroid/Android-Builder/blob/8c3c69ce1b2974c7351b2b48f249d2b700f91a8d/.github/workflows/kernel.yml#L253-L293
          # Add configuration
          for config in $(cat ${{ env.ADD_DEFCONFIG }})
          do
            echo $config >> arch/${{ env.arch }}/configs/${{ env.DEFCONFIG_NAME }}
          done
          echo "🎖️ Apply defconfig"

          # Apply patch
          if [ -f kernel/Makefile ]; then
            # Not strictly necessary but makes sure that moby's check-config.sh can accurately determine which feature is supported and which is not
            # The downside is that by unspoofing the defconfig the following error dialog will appear at every boot (it can be dismissed though by clicking on OK):
            # "There's an internal problem with your device. Contact your manufacturer for details."
            sed -i 's|^\$(obj)/config_data\.gz:.*$|$(obj)/config_data.gz: $(KCONFIG_CONFIG) FORCE|' kernel/Makefile
            echo "🎖️ Modify kernel/Makefile to unspoof defconfig"
          fi
          if [ -f kernel/cgroup.c ]; then
            row=$(sed -n -e '/^static int cgroup_add_file/=' kernel/cgroup.c)
            rm -f /tmp/tmp.txt && touch /tmp/tmp.txt
            sed -n -e '/static int cgroup_add_file/,/return 0/p' kernel/cgroup.c >> /tmp/tmp.txt
            row2=$(sed -n -e '/return 0/=' /tmp/tmp.txt)
            row3=$(echo `expr $row + $row2 - 1`)
            sed -i "$row3 i\        }" kernel/cgroup.c
            sed -i "$row3 i\                kernfs_create_link(cgrp->kn, name, kn);" kernel/cgroup.c
            sed -i "$row3 i\                snprintf(name, CGROUP_FILE_NAME_MAX, \"%s.%s\", cft->ss->name, cft->name);" kernel/cgroup.c
            sed -i "$row3 i\        if (cft->ss && (cgrp->root->flags & CGRP_ROOT_NOPREFIX) && !(cft->flags & CFTYPE_NO_PREFIX)) {" kernel/cgroup.c
            echo "🎖️ Modify kernel/cgroup.c"
          fi
          if [ -f kernel/cgroup/cgroup.c ]; then
            row=$(sed -n -e '/^static int cgroup_add_file/=' kernel/cgroup/cgroup.c)
            rm -f /tmp/tmp.txt && touch /tmp/tmp.txt
            sed -n -e '/static int cgroup_add_file/,/return 0/p' kernel/cgroup/cgroup.c >> /tmp/tmp.txt
            row2=$(sed -n -e '/return 0/=' /tmp/tmp.txt)
            row3=$(echo `expr $row + $row2 - 1`)
            sed -i "$row3 i\        }" kernel/cgroup/cgroup.c
            sed -i "$row3 i\                kernfs_create_link(cgrp->kn, name, kn);" kernel/cgroup/cgroup.c
            sed -i "$row3 i\                snprintf(name, CGROUP_FILE_NAME_MAX, \"%s.%s\", cft->ss->name, cft->name);" kernel/cgroup/cgroup.c
            sed -i "$row3 i\        if (cft->ss && (cgrp->root->flags & CGRP_ROOT_NOPREFIX) && !(cft->flags & CFTYPE_NO_PREFIX)) {" kernel/cgroup/cgroup.c
            echo "🎖️ Modify kernel/cgroup/cgroup.c"
          fi
          # Fix "failed to start daemon: error initializing graphdriver: driver not supported: overlay2"
          # Reference: https://github.com/android-kxxt/android_kernel_xiaomi_sm8450/commit/e6114a39e9e6d7a0c96b0c4db354b43cb5f40fed
          if [ -f fs/overlayfs/util.c ]; then
            sed -i '/^bool ovl_dentry_weird(/,/^}/ {
              # replace the line: “DCACHE_MANAGE_TRANSIT |” with “DCACHE_MANAGE_TRANSIT”
              s/\(^[[:space:]]*DCACHE_MANAGE_TRANSIT\)[[:space:]]*|$/\1);/

              # delete the line: “DCACHE_OP_HASH |” (if exists)
              /^[[:space:]]*DCACHE_OP_HASH |$/d

              # delete the line: “DCACHE_OP_HASH);” (if exists)
              /^[[:space:]]*DCACHE_OP_HASH);$/d

              # delete the line: “DCACHE_OP_COMPARE |” (if exists)
              /^[[:space:]]*DCACHE_OP_COMPARE |$/d

              # delete the line: “DCACHE_OP_COMPARE);” (if exists)
              /^[[:space:]]*DCACHE_OP_COMPARE);$/d

            }' fs/overlayfs/util.c
            echo "🎖️ Modify fs/overlayfs/util.c"
          fi
          # net/netfilter/xt_qtaguid.c patch is omitted because we build for kernel 4.14 and starting from kernel 4.9 this file was removed in favor of eBPF

      - name: "👍 Make defconfig"
        working-directory: ${{ env.KERNEL_NAME }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
          arch: ${{ steps.generate-args.outputs.ARCH }}
        run: |
          echo "PATH Variable: ${PATH}"
          make ${{ env.args }} ${{ env.DEFCONFIG_NAME }}

      - name: "Define output artifact names"
        id: define-output-names
        env:
          run_number: ${{ github.run_number }}
          KERNEL_GIT_REF: ${{ steps.clone-kernel.outputs.KERNEL_GIT_REF}}
          KERNELSU_NEXT_VERSION: ${{ steps.integrate-kernelsu-next.outputs.KERNELSU_NEXT_VERSION }}
          KERNELSU_NEXT_GIT_REF: ${{ steps.integrate-kernelsu-next.outputs.KERNELSU_NEXT_GIT_REF }}
          SUSFS_VERSION: ${{ steps.add-susfs-patches.outputs.SUSFS_VERSION }}
          SUSFS_GIT_REF: ${{ steps.add-susfs-patches.outputs.SUSFS_GIT_REF }}
        run: |
          release_name="[${builddate}.${run_number}]"

          prefix="${KERNEL_DEVICE}-${KERNEL_NAME}-${builddate}"
          suffix=

          if [ "${withKernelSU}" != "true" ] && [ "${withSUSFS}" != "true" ] && [ "${withLXC}" != "true" ]; then
            release_name="${release_name} Normal kernel (untouched)"
            release_description="Untouched Linux kernel for Xiaomi Redmi Note 10 Pro (sweet). This release does **NOT** have KernelSU Next or SUSFS.\n\n- Kernel git ref: [\`${KERNEL_GIT_REF}\`](${KERNEL_REPO}/commit/${KERNEL_GIT_REF})\n\n**Installation:**\n1. Flash the kernel from this release from the [OrangeFox](https://github.com/basamaryan/android_device_xiaomi_sweet-TWRP/releases) recovery.\n2. Done."
          fi

          if [ "${withKernelSU}" = "true" ]; then
            suffix="${suffix}_KernelSU-Next-${KERNELSU_NEXT_VERSION}"

            release_name="${release_name} KernelSU Next ${KERNELSU_NEXT_VERSION}"
            release_description="Linux kernel for Xiaomi Redmi Note 10 Pro (sweet) patched with [KernelSU Next ${KERNELSU_NEXT_VERSION}](https://github.com/KernelSU-Next/KernelSU-Next).\n\n- Kernel git ref: [\`${KERNEL_GIT_REF}\`](${KERNEL_REPO}/commit/${KERNEL_GIT_REF})\n- KernelSU Next git ref: [\`${KERNELSU_NEXT_GIT_REF}\`](https://github.com/KernelSU-Next/KernelSU-Next/commit/${KERNELSU_NEXT_GIT_REF})\n\n**Installation:**\n1. Flash the kernel from this release from the [OrangeFox](https://github.com/basamaryan/android_device_xiaomi_sweet-TWRP/releases) recovery.\n2. Download and install the [latest KernelSU Next manager APK](https://github.com/KernelSU-Next/KernelSU-Next/releases/${KERNELSU_NEXT_VERSION})."
          fi

          if [ "${withSUSFS}" = "true" ]; then
            suffix="${suffix}_SUSFS-${SUSFS_VERSION}"

            release_name="${release_name} + SUSFS ${SUSFS_VERSION}"
            release_description="Linux kernel for Xiaomi Redmi Note 10 Pro (sweet) patched with [KernelSU Next ${KERNELSU_NEXT_VERSION}](https://github.com/KernelSU-Next/KernelSU-Next) + [SUSFS ${SUSFS_VERSION}](https://gitlab.com/simonpunk/susfs4ksu/-/tree/kernel-4.14).\n\n- Kernel git ref: [\`${KERNEL_GIT_REF}\`](${KERNEL_REPO}/commit/${KERNEL_GIT_REF})\n- KernelSU Next git ref: [\`${KERNELSU_NEXT_GIT_REF}\`](https://github.com/KernelSU-Next/KernelSU-Next/commit/${KERNELSU_NEXT_GIT_REF})\n- SUSFS git ref: [\`${SUSFS_GIT_REF}\`](https://github.com/devnoname120/susfs4ksu-toco/commit/${SUSFS_GIT_REF})\n\n**Installation:**\n1. Flash the kernel from this release from the [OrangeFox](https://github.com/basamaryan/android_device_xiaomi_sweet-TWRP/releases) recovery.\n2. Download and install the [latest KernelSU Next manager APK](https://github.com/KernelSU-Next/KernelSU-Next/releases/${KERNELSU_NEXT_VERSION}). \n3. Install the latest [susfs4ksu-module](https://github.com/sidex15/susfs4ksu-module/releases) in KernelSU Next."
          fi

          if [ "${withLXC}" = "true" ]; then
            suffix="${suffix}_LXC"

            release_name="${release_name} + LXC (for Docker support)"
            release_description="Linux kernel for Xiaomi Mi Note 10 Lite (toco) patched with [KernelSU Next ${KERNELSU_NEXT_VERSION}](https://github.com/KernelSU-Next/KernelSU-Next) + [SUSFS ${SUSFS_VERSION}](https://gitlab.com/simonpunk/susfs4ksu/-/tree/kernel-4.14) + LXC for Docker support.\n\n- Kernel git ref: [\`${KERNEL_GIT_REF}\`](${KERNEL_REPO}/commit/${KERNEL_GIT_REF})\n- KernelSU Next git ref: [\`${KERNELSU_NEXT_GIT_REF}\`](https://github.com/KernelSU-Next/KernelSU-Next/commit/${KERNELSU_NEXT_GIT_REF})\n- SUSFS git ref: [\`${SUSFS_GIT_REF}\`](https://github.com/devnoname120/susfs4ksu-toco/commit/${SUSFS_GIT_REF})\n\n**Installation:**\n1. Flash the kernel from this release from the [OrangeFox](https://github.com/basamaryan/android_device_xiaomi_sweet-TWRP/releases) recovery.\n2. Download and install the [latest KernelSU Next manager APK](https://github.com/KernelSU-Next/KernelSU-Next/releases/${KERNELSU_NEXT_VERSION}). \n3. Install the latest [susfs4ksu-module](https://github.com/sidex15/susfs4ksu-module/releases) in KernelSU Next. \n 4. Install the [Magisk Docker](https://github.com/mgksu/dockerd/releases) module to enable Docker support, then follow the instructions in the [README.md](https://github.com/mgksu/dockerd) for how to use it."
          fi


          kernel_final_source_tarball="kernel-final-source-tarball.gz-${prefix}${suffix}"
          image_gz="Image.gz-${prefix}${suffix}"
          dtb="dtb-${prefix}${suffix}"
          dtbo_img="dtbo.img-${prefix}${suffix}"
          anykernel3="${prefix}${suffix}"

          release_zip="${anykernel3}.zip"
          release_tag="${builddate}.${run_number}${suffix}"

          echo "kernel_final_source_tarball=${kernel_final_source_tarball}" >> "${GITHUB_OUTPUT}"
          echo "image_gz=${image_gz}" >> "${GITHUB_OUTPUT}"
          echo "dtb=${dtb}" >> "${GITHUB_OUTPUT}"
          echo "dtbo_img=${dtbo_img}" >> "${GITHUB_OUTPUT}"
          echo "anykernel3=${anykernel3}" >> "${GITHUB_OUTPUT}"

          echo "release_name=${release_name}" >> "${GITHUB_OUTPUT}"
          echo "release_zip=${release_zip}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"

          echo "release_description<<EOF" >> "${GITHUB_OUTPUT}"
          echo -e "${release_description}" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"


      - name: "💛 Upload kernel source tarball before build"
        uses: actions/upload-artifact@v4
        env:
          arch: ${{ steps.generate-args.outputs.ARCH }}
        with:
          name: ${{ steps.define-output-names.outputs.kernel_final_source_tarball }}
          path: ${{ env.KERNEL_NAME }}
          if-no-files-found: ignore
          retention-days: 90

      - name: "🎶 Build kernel"
        working-directory: ${{ env.KERNEL_NAME }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          echo "PATH Variable: ${PATH}"
          make ${{ env.args }}



      #- name: "💛 Upload Image"
      #  uses: actions/upload-artifact@v3
      #  env:
      #    arch: ${{ steps.generate-args.outputs.ARCH }}
      #  with:
      #    name: Image-${{ env.KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}-${{ env.builddate }}
      #    path: ${{ env.OUT_DIR }}/arch/${{ env.arch }}/boot/Image
      #    if-no-files-found: ignore
      #    retention-days: 7

      - name: "💙 Upload Image.gz"
        uses: actions/upload-artifact@v4
        env:
          arch: ${{ steps.generate-args.outputs.ARCH }}
        with:
          name: ${{ steps.define-output-names.outputs.image_gz }}
          path: ${{ env.OUT_DIR }}/arch/${{ env.arch }}/boot/Image.gz
          if-no-files-found: ignore
          retention-days: 90

      - name: "💜 Upload dtb"
        uses: actions/upload-artifact@v4
        env:
          arch: ${{ steps.generate-args.outputs.ARCH }}
        with:
          name: ${{ steps.define-output-names.outputs.dtb }}
          path: ${{ env.OUT_DIR }}/arch/${{ env.arch }}/boot/dtb
          if-no-files-found: ignore
          retention-days: 90

      - name: "❤️ Upload dtbo.img"
        uses: actions/upload-artifact@v4
        env:
          arch: ${{ steps.generate-args.outputs.ARCH }}
        with:
          name: ${{ steps.define-output-names.outputs.dtbo_img}}
          path: ${{ env.OUT_DIR }}/arch/${{ env.arch }}/boot/dtbo.img
          if-no-files-found: ignore
          retention-days: 90

      - name: "❤️ Pack AnyKernel3.zip"
        if: ${{ env.useAnykernel == 'true' }}
        env:
          arch: ${{ steps.generate-args.outputs.ARCH }}
          anykernel: "${{ env.WORKSPACE }}/${{ steps.define-output-names.outputs.anykernel3 }}"
        run: |
          ls -al

          if [ -e "${{ env.OUT_DIR }}/arch/${{ env.arch }}/boot/Image.gz" ]; then
            cp -f ${{ env.OUT_DIR }}/arch/${{ env.arch }}/boot/Image.gz ./AnyKernel3/
          fi
          if [ -e "${{ env.OUT_DIR }}/arch/${{ env.arch }}/boot/dtbo" ]; then
            cp -f ${{ env.OUT_DIR }}/arch/${{ env.arch }}/boot/dtbo ./AnyKernel3/
          fi
          if [ -e "${{ env.OUT_DIR }}/arch/${{ env.arch }}/boot/dtbo.img" ]; then
            cp -f ${{ env.OUT_DIR }}/arch/${{ env.arch }}/boot/dtbo.img ./AnyKernel3/
          fi

          cd AnyKernel3/
          zip -q -r "${{ env.anykernel }}.zip" *

      - name: "💾 Upload AnyKernel3 image => (${{ env.builddate }})"
        uses: actions/upload-artifact@v4
        if: ${{ env.useAnykernel == 'true' }}
        with:
          name: "${{ steps.define-output-names.outputs.anykernel3 }}"
          path: AnyKernel3/*

      - name: 🧧 Create GitHub Release => (${{ env.builddate }})
        continue-on-error: false
        uses: softprops/action-gh-release@v2.1.0
        if: ${{ env.useAnykernel == 'true' && env.release == 'true' }}
        with:
          tag_name: ${{ steps.define-output-names.outputs.release_tag }}
          name: ${{ steps.define-output-names.outputs.release_name }}
          make_latest: ${{ env.withKernelSU == 'true' && env.withSUSFS == 'true' && env.withLXC != 'true' }}
          prerelease: false
          draft: false
          generate_release_notes: false
          body: ${{ steps.define-output-names.outputs.release_description }}
          files: "${{ env.WORKSPACE }}/${{ steps.define-output-names.outputs.release_zip }}"
          fail_on_unmatched_files: true
          preserve_order: true
