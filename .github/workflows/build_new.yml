name: "Build Kernel"
env:
  OUT_DIR: "${{ github.workspace }}/out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-22.04
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          # Reset PATH dla bezpieczeństwa
          export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH"
          
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          if [ -f repos/repos.b2q.json ]; then
            jq -s '[.[][]]' repos/repos.b2q.json >> $GITHUB_OUTPUT
          else
            echo "[]" >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build Kernel"
    runs-on: ubuntu-22.04
    needs: Set-repos
    strategy:
      max-parallel: 4
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      KERNEL_NAME: ${{ matrix.repos.kernelSource.name }}
      KERNEL_REPO: ${{ matrix.repos.kernelSource.repo }}
      KERNEL_BRANCH: ${{ matrix.repos.kernelSource.branch }}
      DEFCONFIG: ${{ matrix.repos.kernelSource.defconfig }}

    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3
        with:
          path: "builder"

      - name: "📦 Install Dependencies"
        run: |
          # Reset PATH
          export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH"
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev lld llvm curl git wget zip unzip tar jq gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi build-essential libelf-dev dwarves

      - name: "🌟 Clone Kernel Source"
        run: |
          git clone --recursive --depth=1 -j $(nproc) --branch "${KERNEL_BRANCH}" "${KERNEL_REPO}" kernel_source

      - name: "🔧 Download & Setup Toolchain (Robust)"
        env:
          TOOLCHAINS: ${{ toJSON(matrix.repos.toolchains) }}
        run: |
          # 1. Reset PATH (Naprawia błąd 'command not found')
          export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH"
          
          if echo "$TOOLCHAINS" | jq -e 'type == "object"' >/dev/null 2>&1; then
             TOOLCHAINS=$(echo "[$TOOLCHAINS]" | jq '.')
          fi

          COUNT=$(echo "$TOOLCHAINS" | jq 'length')
          echo "Found $COUNT toolchain(s)"

          for (( i=0; i<COUNT; i++ )); do
            # Trimujemy spacje z JSONa dla bezpieczeństwa
            NAME=$(echo "$TOOLCHAINS" | jq -r ".[$i].name" | tr -d '[:space:]')
            URL=$(echo "$TOOLCHAINS" | jq -r ".[$i].url // empty" | tr -d '[:space:]')
            
            echo "📦 Setup toolchain: $NAME"
            DIR="${{ github.workspace }}/toolchains/$NAME"
            mkdir -p "$DIR"

            if [[ -n "$URL" && "$URL" != "null" ]]; then
              echo "⬇️ Downloading from: $URL"
              FILENAME="toolchain.tar.gz"
              wget -q "$URL" -O "/tmp/$FILENAME"
              
              # 2. Wypakowujemy BEZ --strip-components (bezpieczniejsze)
              tar -xzf "/tmp/$FILENAME" -C "$DIR"
              rm -f "/tmp/$FILENAME"

              # 3. Naprawiamy strukturę katalogów
              # Jeśli w $DIR jest tylko JEDEN podkatalog (np. Clang-14/), przenosimy jego zawartość wyżej
              SUBFOLDERS=$(find "$DIR" -mindepth 1 -maxdepth 1 -type d 2>/dev/null)
              COUNT_SUB=$(echo "$SUBFOLDERS" | wc -l)
              
              if [[ $COUNT_SUB -eq 1 && -n "$SUBFOLDERS" ]]; then
                  echo "📂 Wykryto folder główny. Przenoszę zawartość do korzenia..."
                  mv "$SUBFOLDERS"/* "$DIR"/ 2>/dev/null || true
                  mv "$SUBFOLDERS"/.[!.]* "$DIR"/ 2>/dev/null || true
                  rmdir "$SUBFOLDERS" 2>/dev/null || true
              fi
              
              # Jeśli bin nie istnieje, ale jest sam plik 'clang' (struktura płaska)
              if [[ ! -d "$DIR/bin" && -f "$DIR/clang" ]]; then
                  echo "🔧 Tworzę folder bin i przenoszę clang..."
                  mkdir -p "$DIR/bin"
                  mv "$DIR/clang" "$DIR/bin/"
              fi
              
            else
              echo "❌ Error: No URL provided for $NAME"
              exit 1
            fi

            if [[ -d "$DIR/bin" ]]; then
              echo "$DIR/bin" >> $GITHUB_PATH
              echo "✅ Toolchain ready at: $DIR/bin"
            else
              echo "⚠️ Warning: bin directory not found in $DIR"
              ls -la "$DIR"
            fi
          done

      - name: "🔍 Locate Clang Binary"
        id: locate-clang
        run: |
          # Reset PATH
          export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH"
          
          TOOLCHAIN_DIR="${{ github.workspace }}/toolchains/zyc-clang"
          echo "🔎 Searching for clang in $TOOLCHAIN_DIR..."
          
          # Szukamy pliku wykonywalnego o nazwie 'clang' lub 'clang-*'
          CLANG_BIN=$(find "$TOOLCHAIN_DIR" -name "clang" -o -name "clang-[0-9]*" -type f -executable 2>/dev/null | head -n 1)
          
          # Fallback: szukamy w bin/
          if [[ -z "$CLANG_BIN" ]]; then
             CLANG_BIN=$(find "$TOOLCHAIN_DIR" -path "*/bin/clang" -type f -executable 2>/dev/null | head -n 1)
          fi
          
          if [[ -z "$CLANG_BIN" || ! -x "$CLANG_BIN" ]]; then
            echo "❌ FATAL: Nie znaleziono pliku binarnego clang!"
            echo "Struktura katalogów:"
            ls -R "$TOOLCHAIN_DIR" 2>/dev/null | head -20
            exit 1
          fi
          
          echo "✅ Found Clang at: $CLANG_BIN"
          "$CLANG_BIN" --version | head -3
          echo "CLANG_BIN=$CLANG_BIN" >> $GITHUB_OUTPUT

      - name: "🔨 Build Kernel (Verbose & Safe)"
        working-directory: kernel_source
        env:
          PARAMS: ${{ toJSON(matrix.repos.params) }}
          CLANG_BIN: ${{ steps.locate-clang.outputs.CLANG_BIN }}
        run: |
          # Reset PATH
          export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH"
          
          if [[ -z "$CLANG_BIN" || ! -x "$CLANG_BIN" ]]; then
            echo "❌ FATAL: CLANG_BIN is not valid!"
            exit 1
          fi

          echo "🚀 Building with Explicit Clang: $CLANG_BIN"
          
          ARCH=$(echo "$PARAMS" | jq -r '.ARCH // "arm64"')
          DEFCONFIG='${{ matrix.repos.kernelSource.defconfig }}'

          # 🔑 KLUCZOWE FLAGI:
          # CC="$CLANG_BIN" -> Wymusza nasz toolchain
          # WERROR=0      -> Wyłącza traktowanie warningów jako błędów (naprawia HDRTEST)
          # GCC_TOOLCHAIN=-> Blokuje auto-wykrywanie systemowego GCC
          # V=1           -> Pełny verbose
          CMD="make -j$(nproc) O=${{ github.workspace }}/out ARCH=${ARCH} CC=\"$CLANG_BIN\" HOSTCC=clang LLVM=1 LLVM_IAS=1 GCC_TOOLCHAIN= WERROR=0 V=1"
          
          # Dodaj CROSS_COMPILE itp. z JSON (bez nadpisywania CC)
          if [[ $(echo "$PARAMS" | jq 'has("externalCommand")') == "true" ]]; then
             while read -r param; do
               KEY=$(echo "$param" | cut -d= -f1)
               VAL=$(echo "$param" | cut -d= -f2-)
               [[ "$KEY" == "CC" ]] && continue
               [[ -n "$VAL" ]] && CMD="$CMD $KEY=$VAL"
             done < <(jq -r '.externalCommand | to_entries[] | "\(.key)=\(.value)"' <<< "$PARAMS")
          fi

          echo "📝 Command: $CMD $DEFCONFIG"
          
          make mrproper >/dev/null 2>&1 || true
          eval "$CMD $DEFCONFIG"
          eval "$CMD"

          echo "✅ Build finished."
          ls -l "${{ github.workspace }}/out/arch/${ARCH}/boot/Image.gz" 2>/dev/null || echo "⚠️ Image.gz not found"
