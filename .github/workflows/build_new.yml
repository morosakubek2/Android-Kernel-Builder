name: "Build kernels"

env:
  OUT_DIR: "${{ github.workspace }}/out"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-22.04
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
      builddate: ${{ steps.generate-builddate.outputs.builddate }}

    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          jq -s '[.[][]]' repos/repos*.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: "⏰ Set builddate"
        id: generate-builddate
        run: echo "builddate=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    needs:
      - Set-repos

    strategy:
      max-parallel: 4
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}

    env:
      WORKSPACE: ${{ github.workspace }}
      builddate: "${{ needs.Set-repos.outputs.builddate }}"

      KERNEL_NAME: ${{ matrix.repos.kernelSource.name }}
      KERNEL_REPO: ${{ matrix.repos.kernelSource.repo }}
      KERNEL_BRANCH: ${{ matrix.repos.kernelSource.branch }}
      KERNEL_DEVICE: ${{ matrix.repos.kernelSource.device }}

      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.defconfig }}

      withKernelSU: ${{ matrix.repos.withKernelSU }}
      ccache: ${{ matrix.repos.ccache }}
      useAnykernel: ${{ matrix.repos.AnyKernel3.use }}
      release: ${{ matrix.repos.AnyKernel3.release }}

    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev libfl-dev
          sudo apt-get install -y curl git ftp lftp wget libarchive-tools ccache python2 python2-dev
          sudo apt-get install -y zip unzip tar gzip bzip2 rar unrar
          sudo apt-get install -y libtinfo5 jq

      - name: "🚄 Create cache key"
        if: ${{ env.ccache == 'true' }}
        id: ccache_key
        run: |
          ccache -o compression=false -o cache_dir=$HOME/.ccache
          echo "CACHE_KEY=$(echo -n '${{ toJSON(matrix.repos) }}' | base64 -w 0 | cut -c -48)" >> $GITHUB_OUTPUT

      - name: "🚅 Cache ccache"
        if: ${{ env.ccache == 'true' }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            ${{ env.OUT_DIR }}
          key: ccache-${{ env.KERNEL_NAME }}-${{ steps.ccache_key.outputs.CACHE_KEY }}-${{ env.builddate }}
          restore-keys: |
            ccache-${{ env.KERNEL_NAME }}-${{ steps.ccache_key.outputs.CACHE_KEY }}

      - name: "⏰ Setup AnyKernel3"
        env:
          params: "${{ toJSON(matrix.repos.AnyKernel3) }}"
        run: |
          ANYKERNEL_REPO=$(echo $params | jq -r ".repo")
          ANYKERNEL_BRANCH=$(echo $params | jq -r ".branch")
          git clone --depth=1 --branch $ANYKERNEL_BRANCH $ANYKERNEL_REPO AnyKernel3

      - name: "🌟 Clone kernel source"
        run: |
          git clone --depth=1 --branch $KERNEL_BRANCH $KERNEL_REPO $KERNEL_NAME

      - name: "💫 Get toolchains"
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          toolchains_num="$(echo $toolchains | jq 'length')"
          for ((i=0;i<toolchains_num;i++)); do
            name=$(echo $toolchains | jq -r ".[$i].name")
            repo=$(echo $toolchains | jq -r ".[$i].repo")
            branch=$(echo $toolchains | jq -r ".[$i].branch")
            url=$(echo $toolchains | jq -r ".[$i].url")

            if [ -z "${url:-}" ] || [ "$url" = "null" ]; then
              git clone --depth=1 --branch $branch $repo $name
            else
              wget "$url"
              file="${url##*/}"
              mkdir -p $name
              tar -xf "$file" -C $name || true
            fi

            jq -r ".[$i].binPath[]" <<< "$toolchains" | while read p; do
              echo "$WORKSPACE/$name/$p" >> $GITHUB_PATH
            done
          done

      - name: "😎 Set args"
        id: args
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
        run: |
          ARCH=$(echo $params | jq -r ".ARCH")
          CC=$(echo $params | jq -r ".CC")

          args="-j$(nproc)"

          mkdir -p $OUT_DIR
          args="$args O=$OUT_DIR ARCH=$ARCH"

          if [ "$ccache" = "true" ]; then
            args="$args CC=\"ccache $CC\""
          else
            args="$args CC=$CC"
          fi

          while read line; do
            args="$args $line"
          done < <(jq -r '.externalCommand | to_entries[] | "\(.key)=\(.value)"' <<< "$params")

          echo "args=$args" >> $GITHUB_OUTPUT
          echo "ARCH=$ARCH" >> $GITHUB_OUTPUT

      - name: "👍 Make defconfig"
        working-directory: ${{ env.KERNEL_NAME }}
        run: |
          make ${{ steps.args.outputs.args }} ${{ env.DEFCONFIG_NAME }}

      - name: "🎶 Build kernel"
        working-directory: ${{ env.KERNEL_NAME }}
        run: |
          make ${{ steps.args.outputs.args }}

      # ===== ARTIFACTS (FIXED) =====

      - name: "💛 Upload Image"
        uses: actions/upload-artifact@v4
        with:
          name: Image-${{ env.KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}-${{ env.builddate }}
          path: ${{ env.OUT_DIR }}/arch/${{ steps.args.outputs.ARCH }}/boot/Image
          if-no-files-found: ignore

      - name: "💙 Upload Image.gz"
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz-${{ env.KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}-${{ env.builddate }}
          path: ${{ env.OUT_DIR }}/arch/${{ steps.args.outputs.ARCH }}/boot/Image.gz
          if-no-files-found: ignore

      - name: "💜 Upload dtb"
        uses: actions/upload-artifact@v4
        with:
          name: dtb-${{ env.KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}-${{ env.builddate }}
          path: ${{ env.OUT_DIR }}/arch/${{ steps.args.outputs.ARCH }}/boot/dtb
          if-no-files-found: ignore

      - name: "❤️ Upload dtbo.img"
        uses: actions/upload-artifact@v4
        with:
          name: dtbo.img-${{ env.KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}-${{ env.builddate }}
          path: ${{ env.OUT_DIR }}/arch/${{ steps.args.outputs.ARCH }}/boot/dtbo.img
          if-no-files-found: ignore

      - name: "❤️ Pack AnyKernel3"
        if: ${{ env.useAnykernel == 'true' }}
        run: |
          cp -f $OUT_DIR/arch/${{ steps.args.outputs.ARCH }}/boot/* AnyKernel3/ 2>/dev/null || true
          cd AnyKernel3
          zip -r "../${{ env.KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}_${{ env.builddate }}.zip" *

      - name: "💾 Upload AnyKernel3"
        uses: actions/upload-artifact@v4
        if: ${{ env.useAnykernel == 'true' }}
        with:
          name: "${{ env.KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}_${{ env.builddate }}"
          path: "*.zip"

      - name: "🧧 Release"
        uses: softprops/action-gh-release@v2
        if: ${{ env.useAnykernel == 'true' && env.release == 'true' }}
        with:
          tag_name: v${{ env.builddate }}.${{ github.run_number }}
          files: "*.zip"
          generate_release_notes: true
