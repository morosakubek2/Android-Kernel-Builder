name: "Build Kernel"
env:
  OUT_DIR: "${{ github.workspace }}/out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-22.04
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          if [ -f repos/repos.b2q.json ]; then
            jq -s '[.[][]]' repos/repos.b2q.json >> $GITHUB_OUTPUT
          else
            echo "[]" >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build Kernel"
    runs-on: ubuntu-22.04
    needs: Set-repos
    strategy:
      max-parallel: 4
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      KERNEL_NAME: ${{ matrix.repos.kernelSource.name }}
      KERNEL_REPO: ${{ matrix.repos.kernelSource.repo }}
      KERNEL_BRANCH: ${{ matrix.repos.kernelSource.branch }}
      DEFCONFIG: ${{ matrix.repos.kernelSource.defconfig }}

    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3
        with:
          path: "builder"

      - name: "📦 Install Dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev lld llvm curl git wget zip unzip tar jq gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi build-essential libelf-dev dwarves

      - name: "🌟 Clone Kernel Source"
        run: |
          git clone --recursive --depth=1 -j $(nproc) --branch "${KERNEL_BRANCH}" "${KERNEL_REPO}" kernel_source

      - name: "🔧 Download & Setup Toolchain"
        env:
          TOOLCHAINS: ${{ toJSON(matrix.repos.toolchains) }}
        run: |
          echo "Parsing toolchains..."
          if echo "$TOOLCHAINS" | jq -e 'type == "object"' >/dev/null 2>&1; then
             TOOLCHAINS=$(echo "[$TOOLCHAINS]" | jq '.')
          fi

          COUNT=$(echo "$TOOLCHAINS" | jq 'length')
          echo "Found $COUNT toolchain(s)"

          for (( i=0; i<COUNT; i++ )); do
            NAME=$(echo "$TOOLCHAINS" | jq -r ".[$i].name")
            URL=$(echo "$TOOLCHAINS" | jq -r ".[$i].url // empty")
            
            echo "📦 Setup toolchain: $NAME"
            DIR="${{ github.workspace }}/toolchains/$NAME"
            mkdir -p "$DIR"

            if [[ -n "$URL" && "$URL" != "null" ]]; then
              echo "⬇️ Downloading from: $URL"
              FILENAME=$(basename "$URL")
              wget -q "$URL" -O "/tmp/$FILENAME"
              
              # Wypakuj BEZ --strip-components, aby uniknąć cichych błędów
              tar -xzf "/tmp/$FILENAME" -C "$DIR"
              rm -f "/tmp/$FILENAME"

              # 🛠️ AUTOMATYCZNE NAPRAWIANIE STRUKTURY KATALOGÓW
              # Jeśli wypakowanie stworzyło dokładnie 1 podkatalog, przenieś jego zawartość wyżej
              SUBFOLDERS=$(find "$DIR" -mindepth 1 -maxdepth 1 -type d)
              SUBFOLDER_COUNT=$(echo "$SUBFOLDERS" | wc -l)
              
              if [[ $SUBFOLDER_COUNT -eq 1 && -n "$SUBFOLDERS" ]]; then
                  echo "📂 Przenoszę zawartość z podkatalogu '$(basename $SUBFOLDERS)'..."
                  mv "$SUBFOLDERS"/* "$DIR"/
                  mv "$SUBFOLDERS"/.[!.]* "$DIR"/ 2>/dev/null || true
                  rmdir "$SUBFOLDERS"
              fi
            else
              echo "❌ Error: No URL provided for $NAME"
              exit 1
            fi

            if [[ -d "$DIR/bin" ]]; then
              echo "PATH=$DIR/bin:\$PATH" >> $GITHUB_ENV
              echo "✅ Toolchain ready at: $DIR/bin"
            else
              echo "⚠️ Warning: bin directory not found!"
              ls -la "$DIR"
            fi
          done

      - name: "🔨 Build Kernel (Verbose & Robust)"
        working-directory: kernel_source
        run: |
          echo "🔍 === LOCATING CLANG ==="
          # 🎯 Dynamicznie znajdź plik clang, niezależnie od struktury archiwum
          CLANG_BIN=$(find "${{ github.workspace }}/toolchains/zyc-clang" -name "clang" -type f -executable | head -1)
          
          if [[ -z "$CLANG_BIN" ]]; then
            echo "❌ FATAL: Nie znaleziono pliku binarnego clang w toolchainie!"
            find "${{ github.workspace }}/toolchains/zyc-clang" -type f -name "*clang*" | head -10
            exit 1
          fi
          
          echo "✅ Selected Clang: $CLANG_BIN"
          "$CLANG_BIN" --version | head -3

          # Pobierz parametry
          PARAMS='${{ toJSON(matrix.repos.params) }}'
          DEFCONFIG='${{ matrix.repos.kernelSource.defconfig }}'
          ARCH=$(echo "$PARAMS" | jq -r '.ARCH // "arm64"')

          # 🔑 Buduj komendę make
          # CC=$CLANG_BIN -> wymusza użycie pobranego kompilatora
          # GCC_TOOLCHAIN= -> blokuje --gcc-toolchain=/usr
          # WERROR=0 -> omija błędy HDRTEST/implicit-function
          # V=1 -> pełny verbose
          CMD="make -j$(nproc) O=${{ github.workspace }}/out ARCH=${ARCH} CC='$CLANG_BIN' HOSTCC=clang LLVM=1 LLVM_IAS=1 GCC_TOOLCHAIN= WERROR=0 V=1"
          
          # Dodaj CROSS_COMPILE itp. z JSON
          if [[ $(echo "$PARAMS" | jq 'has("externalCommand")') == "true" ]]; then
             while read -r param; do
               KEY=$(echo "$param" | cut -d= -f1)
               VAL=$(echo "$param" | cut -d= -f2-)
               [[ "$KEY" == "CC" ]] && continue
               [[ -n "$VAL" ]] && CMD="$CMD $KEY=$VAL"
             done < <(jq -r '.externalCommand | to_entries[] | "\(.key)=\(.value)"' <<< "$PARAMS")
          fi

          echo "🚀 Running: $CMD $DEFCONFIG"
          
          make mrproper >/dev/null 2>&1 || true
          eval "$CMD $DEFCONFIG"
          eval "$CMD"

          echo "✅ Build finished."
          ls -l "${{ github.workspace }}/out/arch/${ARCH}/boot/Image.gz" 2>/dev/null || echo "⚠️ Image.gz not found (check out/arch/${ARCH}/boot/ for Image, Image.gz, or Image.gz-dtb)"
