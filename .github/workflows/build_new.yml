name: "Build Kernel (Ubuntu Latest)"
env:
  OUT_DIR: "${{ github.workspace }}/out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse & Clean JSON"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
      builddate: ${{ steps.generate-builddate.outputs.builddate }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "🧹 Clean JSON & Generate Matrix"
        id: generate-matrix
        run: |
          # Automatycznie usuwa spacje z kluczy i wartości w JSON
          jq 'walk(if type == "object" then with_entries(.key |= gsub(" "; "") | .value |= (if type == "string" then gsub(" "; "") else . end)) else . end) | [.[][]]' repos/repos.b2q.json > cleaned_repos.json
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat cleaned_repos.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: "⏰ Set builddate"
        id: generate-builddate
        run: echo "builddate=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build Kernel"
    runs-on: ubuntu-latest
    needs: Set-repos
    strategy:
      max-parallel: 4
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      KERNEL_NAME: ${{ matrix.repos.kernelSource.name }}
      KERNEL_REPO: ${{ matrix.repos.kernelSource.repo }}
      KERNEL_BRANCH: ${{ matrix.repos.kernelSource.branch }}
      DEFCONFIG: ${{ matrix.repos.kernelSource.defconfig }}
      DEVICE: ${{ matrix.repos.kernelSource.device }}

    steps:
      - name: "😄 Checkout Builder"
        uses: actions/checkout@v4
        with:
          path: "builder"

      - name: "📦 Install Dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libelf-dev dwarves lld llvm curl git wget zip unzip tar jq gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi python3 python3-dev libncurses5-dev zlib1g-dev lz4

      - name: "🌟 Clone Kernel Source"
        run: |
          git clone --recursive --depth=1 -j $(nproc) --branch "${KERNEL_BRANCH}" "${KERNEL_REPO}" kernel_source

      - name: "🔧 Download & Setup Toolchain"
        id: setup-tc
        env:
          TC_URL: ${{ matrix.repos.toolchains[0].url }}
        run: |
          TC_DIR="${{ github.workspace }}/toolchains/zyc-clang"
          mkdir -p "$TC_DIR"
          
          echo "⬇️ Downloading toolchain..."
          wget -q "$TC_URL" -O /tmp/toolchain.tar.gz
          
          # Rozpakuj, próbując naprawić strukturę katalogów
          tar -xzf /tmp/toolchain.tar.gz -C "$TC_DIR" --strip-components=1 2>/dev/null || tar -xzf /tmp/toolchain.tar.gz -C "$TC_DIR"
          rm -f /tmp/toolchain.tar.gz

          # Jeśli powstał dokładnie 1 podfolder, przenieś jego zawartość wyżej
          if [ $(find "$TC_DIR" -mindepth 1 -maxdepth 1 -type d | wc -l) -eq 1 ]; then
            mv "$TC_DIR"/*/* "$TC_DIR"/ 2>/dev/null || true
          fi

          # 🔍 Znajdź clang niezawodnie (obsługuje pliki i symlinki)
          CLANG_BIN=$(find "$TC_DIR" -name "clang" -o -name "clang-*" 2>/dev/null | head -n 1)
          
          if [[ -z "$CLANG_BIN" || ! -e "$CLANG_BIN" ]]; then
            echo "❌ CRITICAL: clang not found in $TC_DIR"
            ls -R "$TC_DIR" | head -20
            exit 1
          fi

          echo "✅ Found Clang: $CLANG_BIN"
          "$CLANG_BIN" --version | head -3
          echo "CLANG_BIN=$CLANG_BIN" >> $GITHUB_ENV

      - name: "🔨 Build Kernel (Verbose & Safe)"
        working-directory: kernel_source
        env:
          PARAMS: ${{ toJSON(matrix.repos.params) }}
        run: |
          if [[ -z "$CLANG_BIN" ]]; then echo "❌ CLANG_BIN missing"; exit 1; fi
          echo "🚀 Compiler: $CLANG_BIN"

          ARCH=$(echo "$PARAMS" | jq -r '.ARCH // "arm64"')
          DEFCONFIG='${{ matrix.repos.kernelSource.defconfig }}'

          # 🔑 KLUCZOWE FLAGI:
          # CC="$CLANG_BIN"  -> Wymusza custom toolchain
          # HOSTCC=clang     -> Systemowy clang dla skryptów hosta
          # LLVM=1 LLVM_IAS=1 -> Pełna kompilacja przez LLVM
          # GCC_TOOLCHAIN=   -> Blokuje auto-detect systemowego GCC
          # WERROR=0 KCFLAGS -> Omija HDRTEST i komentarze //
          CMD="make -j$(nproc) O=${{ github.workspace }}/out ARCH=${ARCH} CC='$CLANG_BIN' HOSTCC=clang LLVM=1 LLVM_IAS=1 GCC_TOOLCHAIN= WERROR=0 KCFLAGS=\"-Wno-error -Wno-comment\" V=1"

          # Dodaj CROSS_COMPILE itp., ale NIGDY nie nadpisuj CC
          if [[ $(echo "$PARAMS" | jq 'has("externalCommand")') == "true" ]]; then
             while read -r param; do
               KEY=$(echo "$param" | cut -d= -f1)
               VAL=$(echo "$param" | cut -d= -f2-)
               [[ "$KEY" == "CC" ]] && continue
               [[ -n "$VAL" ]] && CMD="$CMD $KEY=$VAL"
             done < <(jq -r '.externalCommand | to_entries[] | "\(.key)=\(.value)"' <<< "$PARAMS")
          fi

          echo "📝 Running defconfig..."
          make mrproper >/dev/null 2>&1 || true
          eval "$CMD $DEFCONFIG"

          # 🛡️ Wyłącz restrykcyjne sprawdzanie nagłówków w .config
          sed -i 's/CONFIG_HEADERS_CHECK=y/# CONFIG_HEADERS_CHECK is not set/' .config 2>/dev/null || true
          sed -i 's/CONFIG_WERROR=y/# CONFIG_WERROR is not set/' .config 2>/dev/null || true
          make olddefconfig >/dev/null 2>&1 || true

          echo "⚡ Starting full build..."
          eval "$CMD" 2>&1 | tee /tmp/build.log

          echo "✅ Build finished."
          ls -l "${{ github.workspace }}/out/arch/${ARCH}/boot/Image.gz" 2>/dev/null || echo "⚠️ Image.gz not found (check out/arch/${ARCH}/boot/)"
