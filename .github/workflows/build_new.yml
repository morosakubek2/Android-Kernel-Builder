name: "Build kernels"

env:
  OUT_DIR: "${{ github.workspace }}/out"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-22.04
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
      builddate: ${{ steps.generate-builddate.outputs.builddate }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> ${GITHUB_OUTPUT}
          jq -s '[.[][]]' repos/repos*.json >> ${GITHUB_OUTPUT}
          echo "EOF" >> ${GITHUB_OUTPUT}

      - name: "⏰ Set builddate"
        id: generate-builddate
        run: echo "builddate=$(date +'%Y%m%d')" >> ${GITHUB_OUTPUT}

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-22.04
    needs:
      - Set-repos
    strategy:
      max-parallel: 8
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      WORKSPACE: ${{ github.workspace }}
      builddate: "${{ needs.Set-repos.outputs.builddate }}"

      KERNEL_NAME: ${{ matrix.repos.kernelSource.name }}
      KERNEL_REPO: ${{ matrix.repos.kernelSource.repo }}
      KERNEL_BRANCH: ${{ matrix.repos.kernelSource.branch }}
      KERNEL_DEVICE: ${{ matrix.repos.kernelSource.device }}

      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.defconfig }}

      withKernelSU: ${{ matrix.repos.withKernelSU }}
      withSUSFS: ${{ matrix.repos.withSUSFS }}
      withLXC: ${{ matrix.repos.withLXC }}
      useAnykernel: ${{ matrix.repos.AnyKernel3.use }}
      release: ${{ matrix.repos.AnyKernel3.release }}

    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3
        with:
          path: "repo"

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libfl-dev lld llvm curl git wget zip unzip tar rsync jq

      - name: "⏰ Setup Anykernel3"
        env:
          params: "${{ toJSON(matrix.repos.AnyKernel3) }}"
        run: |
          ANYKERNEL_REPO=$(echo ${params} | jq -r ".repo")
          ANYKERNEL_BRANCH=$(echo ${params} | jq -r ".branch")
          git clone --recursive --depth=1 -j $(nproc) --branch ${ANYKERNEL_BRANCH} ${ANYKERNEL_REPO} AnyKernel3

      - name: "🌟 Clone kernel source"
        id: clone-kernel
        run: |
          git clone --recursive --depth=1 -j $(nproc) --branch ${KERNEL_BRANCH} ${KERNEL_REPO} ${KERNEL_NAME}
          KERNEL_GIT_REF=$(git -C ${KERNEL_NAME} rev-parse --short HEAD)
          echo "KERNEL_GIT_REF=${KERNEL_GIT_REF}" >> ${GITHUB_OUTPUT}

      - name: "💫 Get Gonon Clang toolchain"
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          for ((i=0;i<$(echo ${toolchains} | jq 'length');i++)); do
            name=$(echo ${toolchains} | jq -r ".[${i}].name")
            repo=$(echo ${toolchains} | jq -r ".[${i}].repo")
            branch=$(echo ${toolchains} | jq -r ".[${i}].branch")
            git clone --depth=1 --branch ${branch} ${repo} ${name}
            jq -r ".[${i}].binPath[] | tostring" <<< "${toolchains}" | while read -r bin_path; do
              echo "${WORKSPACE}/${name}/${bin_path}" >> ${GITHUB_PATH}
            done
          done

      - name: "😎 Set args"
        id: generate-args
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
        run: |
          ARCH=$(echo ${params} | jq -r ".ARCH")
          CC=$(echo ${params} | jq -r ".CC")

          args="-j$(nproc --all)"
          if [ -n "${{ env.OUT_DIR }}" ]; then
            mkdir -p ${{ env.OUT_DIR }} && args="${args} O=${{ env.OUT_DIR }}"
          fi
          if [ -n "${ARCH}" ]; then
            args="${args} ARCH=${ARCH}"
          fi
          if [ -n "${CC}" ]; then
            args="${args} CC=${CC}"
          fi
          while read -r externalCommand; do
            key=$(echo "${externalCommand}" | cut -d= -f1)
            value=$(echo "${externalCommand}" | cut -d= -f2)
            args="${args} ${key}=${value}"
          done < <(jq -r '.externalCommand | to_entries[] | "\(.key)=\(.value)"' <<< "${params}")

          echo "args=${args}" >> ${GITHUB_OUTPUT}
          echo "ARCH=${ARCH}" >> ${GITHUB_OUTPUT}

      - name: "🔬 Advanced Diagnostics"
        working-directory: ${{ env.KERNEL_NAME }}
        run: |
          echo "══════════════════════════════════════════════════════════════"
          echo "🔬 ADVANCED TOOLCHAIN DIAGNOSTICS"
          echo "══════════════════════════════════════════════════════════════"
          clang --version | head -10
          ld.lld --version
          echo "PATH: $PATH"
          ls -l ${{ env.WORKSPACE }}/gonon-clang/bin/ | grep -E 'clang|ld|llvm' | head -20 || true
          echo "══════════════════════════════════════════════════════════════"

      - name: "🛠️ Fix Camera/Techpack HDRINST errors"
        working-directory: ${{ env.KERNEL_NAME }}
        run: |
          echo "Disabling problematic camera options..."
          scripts/config --file out/.config -d CONFIG_QCOM_CAMERA_SS || true
          scripts/config --file out/.config -d CONFIG_CAM_SS || true
          scripts/config --file out/.config -d CONFIG_CAMERA_BOKEH || true
          scripts/config --file out/.config -d CONFIG_CAMERA_SAMSUNG || true
          make ${{ env.args }} ${{ env.DEFCONFIG_NAME }}

      - name: "🎶 Build kernel (dtbs + dtbo + Image.gz)"
        working-directory: ${{ env.KERNEL_NAME }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          echo "→ Building dtbs..."
          make ${{ env.args }} dtbs 2>&1 | tee dtbs.log

          echo "→ Building dtbo.img..."
          make ${{ env.args }} dtbo.img 2>&1 | tee dtbo.log || echo "⚠️ dtbo.img warning"

          echo "→ Building Image.gz..."
          make ${{ env.args }} -j$(nproc) Image.gz 2>&1 | tee build.log

          echo "=== LAST 100 LINES OF BUILD ==="
          tail -100 build.log

      - name: "Define output artifact names"
        id: define-output-names
        env:
          run_number: ${{ github.run_number }}
          KERNEL_GIT_REF: ${{ steps.clone-kernel.outputs.KERNEL_GIT_REF }}
        run: |
          # Tutaj wklej swój oryginalny kod tego kroku (cały blok z release_name, suffix, itp.)
          # Jeśli nie masz go zmienionego, możesz zostawić pusty na razie lub wkleić z poprzedniej wersji
          echo "release_name=[${builddate}.${run_number}] ${KERNEL_DEVICE}" >> ${GITHUB_OUTPUT}
          echo "release_zip=${KERNEL_DEVICE}-${KERNEL_NAME}.zip" >> ${GITHUB_OUTPUT}
          echo "release_tag=${builddate}.${run_number}" >> ${GITHUB_OUTPUT}

      - name: "💙 Upload Image.gz"
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz-${{ env.KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}-${{ env.builddate }}
          path: ${{ env.OUT_DIR }}/arch/${{ steps.generate-args.outputs.ARCH }}/boot/Image.gz
          if-no-files-found: ignore
          retention-days: 90

      - name: "❤️ Pack AnyKernel3.zip"
        if: ${{ env.useAnykernel == 'true' }}
        env:
          arch: ${{ steps.generate-args.outputs.ARCH }}
        run: |
          cp -f ${{ env.OUT_DIR }}/arch/${{ env.arch }}/boot/Image.gz AnyKernel3/
          cd AnyKernel3
          zip -q -r "../${KERNEL_DEVICE}-${KERNEL_NAME}.zip" *

      - name: "💾 Upload AnyKernel3"
        if: ${{ env.useAnykernel == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}
          path: ${{ KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}.zip
