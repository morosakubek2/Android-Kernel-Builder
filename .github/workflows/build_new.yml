name: "Build kernels"

env:
  OUT_DIR: "${{ github.workspace }}/out"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "­¤Éé Parse repos.json"
    runs-on: ubuntu-22.04
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
      builddate: ${{ steps.generate-builddate.outputs.builddate }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          jq -s '[.[][]]' repos/repos*.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: "Set builddate"
        id: generate-builddate
        run: echo "builddate=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "­¤ÉÄ Build kernel"
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    needs: Set-repos

    strategy:
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}

    env:
      WORKSPACE: ${{ github.workspace }}
      builddate: "${{ needs.Set-repos.outputs.builddate }}"

      KERNEL_NAME: ${{ matrix.repos.kernelSource.name }}
      KERNEL_REPO: ${{ matrix.repos.kernelSource.repo }}
      KERNEL_BRANCH: ${{ matrix.repos.kernelSource.branch }}
      KERNEL_DEVICE: ${{ matrix.repos.kernelSource.device }}

      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.defconfig }}

      withKernelSU: ${{ matrix.repos.withKernelSU }}
      ccache: ${{ matrix.repos.ccache }}
      useAnykernel: ${{ matrix.repos.AnyKernel3.use }}
      release: ${{ matrix.repos.AnyKernel3.release }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            libssl-dev libfl-dev \
            curl git wget \
            libarchive-tools ccache \
            zip unzip tar gzip bzip2 \
            jq \
            libncurses5 libncurses5-dev \
            python2 python2-dev python-is-python3 \
            libtinfo5

      - name: "Setup ccache"
        if: ${{ env.ccache == 'true' }}
        id: ccache_key
        run: |
          ccache -o compression=false -o cache_dir=$HOME/.ccache
          echo "CACHE_KEY=$(echo -n '${{ toJSON(matrix.repos) }}' | base64 -w 0 | cut -c -48)" >> $GITHUB_OUTPUT

      - name: "Cache ccache"
        if: ${{ env.ccache == 'true' }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            ${{ env.OUT_DIR }}
          key: ccache-${{ env.KERNEL_NAME }}-${{ steps.ccache_key.outputs.CACHE_KEY }}
          restore-keys: |
            ccache-${{ env.KERNEL_NAME }}

      - name: "Clone AnyKernel3"
        if: ${{ env.useAnykernel == 'true' }}
        env:
          params: "${{ toJSON(matrix.repos.AnyKernel3) }}"
        run: |
          git clone --depth=1 \
            -b $(echo $params | jq -r ".branch") \
            $(echo $params | jq -r ".repo") \
            AnyKernel3

      - name: "Clone kernel"
        run: |
          git clone --depth=1 \
            -b $KERNEL_BRANCH \
            $KERNEL_REPO \
            $KERNEL_NAME

      - name: "Get toolchains"
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          count=$(echo $toolchains | jq 'length')
          for ((i=0;i<count;i++)); do
            name=$(echo $toolchains | jq -r ".[$i].name")
            repo=$(echo $toolchains | jq -r ".[$i].repo")
            branch=$(echo $toolchains | jq -r ".[$i].branch")
            url=$(echo $toolchains | jq -r ".[$i].url")

            if [ "$url" = "null" ]; then
              git clone --depth=1 -b $branch $repo $name
            else
              wget "$url"
              file="${url##*/}"
              mkdir -p $name
              tar -xf "$file" -C $name
            fi

            jq -r ".[$i].binPath[]" <<< "$toolchains" | while read p; do
              echo "$WORKSPACE/$name/$p" >> $GITHUB_PATH
            done
          done

      - name: "Set build args"
        id: args
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
        run: |
          ARCH=$(echo $params | jq -r ".ARCH")
          CC=$(echo $params | jq -r ".CC")

          args="-j$(nproc)"
          args="$args O=$OUT_DIR ARCH=$ARCH"

          # FIX CC (bez rozwalania make)
          if [ "$ccache" = "true" ]; then
            args="$args CC=ccache\ $CC"
          else
            args="$args CC=$CC"
          fi

          while read line; do
            args="$args $line"
          done < <(jq -r '.externalCommand | to_entries[] | "\(.key)=\(.value)"' <<< "$params")

          echo "args=$args" >> $GITHUB_OUTPUT
          echo "ARCH=$ARCH" >> $GITHUB_OUTPUT

      - name: "Make defconfig"
        working-directory: ${{ env.KERNEL_NAME }}
        run: |
          make ${{ steps.args.outputs.args }} ${{ env.DEFCONFIG_NAME }}

      # ­¤öź KLUCZOWY DEBUG
      - name: "Build kernel (DEBUG)"
        working-directory: ${{ env.KERNEL_NAME }}
        run: |
          set -o pipefail
          make ${{ steps.args.outputs.args }} 2>&1 | tee build.log

      - name: "Show last log lines"
        if: failure()
        run: |
          echo "==== LAST 200 LINES ===="
          tail -n 200 ${{ env.KERNEL_NAME }}/build.log || true

      - name: "Upload build log"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ${{ env.KERNEL_NAME }}/build.log

      - name: "Upload Image"
        uses: actions/upload-artifact@v4
        with:
          name: Image-${{ env.KERNEL_DEVICE }}-${{ env.builddate }}
          path: ${{ env.OUT_DIR }}/arch/${{ steps.args.outputs.ARCH }}/boot/Image
          if-no-files-found: ignore
