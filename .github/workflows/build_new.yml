name: "Build Kernel"
env:
  OUT_DIR: "${{ github.workspace }}/out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-22.04
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          if [ -f repos/repos.b2q.json ]; then
            jq -s '[.[][]]' repos/repos.b2q.json >> $GITHUB_OUTPUT
          else
            echo "[]" >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build Kernel"
    runs-on: ubuntu-22.04
    needs: Set-repos
    strategy:
      max-parallel: 4
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      KERNEL_NAME: ${{ matrix.repos.kernelSource.name }}
      KERNEL_REPO: ${{ matrix.repos.kernelSource.repo }}
      KERNEL_BRANCH: ${{ matrix.repos.kernelSource.branch }}
      DEFCONFIG: ${{ matrix.repos.kernelSource.defconfig }}

    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v3
        with:
          path: "builder"

      - name: "📦 Install Dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev lld llvm curl git wget zip unzip tar jq gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi build-essential libelf-dev dwarves

      - name: "🌟 Clone Kernel Source"
        run: |
          git clone --recursive --depth=1 -j $(nproc) --branch "${KERNEL_BRANCH}" "${KERNEL_REPO}" kernel_source

      - name: "🔧 Download & Setup Toolchain"
        env:
          TOOLCHAINS: ${{ toJSON(matrix.repos.toolchains) }}
        run: |
          echo "Parsing toolchains..."
          if echo "$TOOLCHAINS" | jq -e 'type == "object"' >/dev/null 2>&1; then
             TOOLCHAINS=$(echo "[$TOOLCHAINS]" | jq '.')
          fi

          COUNT=$(echo "$TOOLCHAINS" | jq 'length')
          echo "Found $COUNT toolchain(s)"

          for (( i=0; i<COUNT; i++ )); do
            NAME=$(echo "$TOOLCHAINS" | jq -r ".[$i].name")
            URL=$(echo "$TOOLCHAINS" | jq -r ".[$i].url // empty")
            
            echo "Setup toolchain: $NAME"
            DIR="${{ github.workspace }}/toolchains/$NAME"
            mkdir -p "$DIR"

            if [[ -n "$URL" && "$URL" != "null" ]]; then
              echo "Downloading from URL: $URL"
              FILENAME=$(basename "$URL")
              wget -q "$URL" -O "/tmp/$FILENAME"
              tar -xzf "/tmp/$FILENAME" -C "$DIR" --strip-components=1 2>/dev/null || \
              tar -xzf "/tmp/$FILENAME" -C "$DIR"
              rm -f "/tmp/$FILENAME"
            else
              echo "Error: No URL provided for $NAME"
              exit 1
            fi

            if [[ -d "$DIR/bin" ]]; then
              echo "PATH=$DIR/bin:\$PATH" >> $GITHUB_ENV
              echo "✅ Added $DIR/bin to PATH"
            else
              echo "⚠️ Warning: bin directory not found in $DIR"
            fi
          done

      - name: "🔍 Verify Toolchain"
        run: |
          echo "=== Checking Custom Clang ==="
          CLANG_PATH="${{ github.workspace }}/toolchains/zyc-clang/bin/clang"
          if [[ -x "$CLANG_PATH" ]]; then
            echo "✅ Found: $CLANG_PATH"
            "$CLANG_PATH" --version | head -3
          else
            echo "❌ NOT FOUND at expected path!"
            exit 1
          fi

      - name: "🔨 Build Kernel (Verbose & Compiler Check)"
        working-directory: kernel_source
        env:
          PARAMS: ${{ toJSON(matrix.repos.params) }}
          DEFCONFIG: ${{ matrix.repos.kernelSource.defconfig }}
        run: |
          echo "🔍 === COMPILER PATH VERIFICATION ==="
          CLANG_BIN="${{ github.workspace }}/toolchains/zyc-clang/bin/clang"

          if [[ ! -x "$CLANG_BIN" ]]; then
            echo "❌ FATAL: Custom clang not found at $CLANG_BIN"
            exit 1
          fi

          echo "✅ Selected Clang: $CLANG_BIN"
          "$CLANG_BIN" --version | head -3

          # Buduj komendę make z jawnym CC i trybem verbose (V=1)
          CMD="make -j$(nproc) O=${{ github.workspace }}/out ARCH=arm64 CC=\"$CLANG_BIN\" HOSTCC=clang LLVM=1 LLVM_IAS=1 GCC_TOOLCHAIN= WERROR=0 V=1"

          # Dodaj parametry z JSON, ale NIE nadpisuj CC
          if [[ $(echo "$PARAMS" | jq 'has("externalCommand")') == "true" ]]; then
             while read -r param; do
               KEY=$(echo "$param" | cut -d= -f1)
               VAL=$(echo "$param" | cut -d= -f2-)
               if [[ "$KEY" != "CC" && -n "$VAL" ]]; then
                 CMD="$CMD $KEY=$VAL"
               fi
             done < <(jq -r '.externalCommand | to_entries[] | "\(.key)=\(.value)"' <<< "$PARAMS")
          fi

          echo "🚀 Final Make Command:"
          echo "$CMD ${DEFCONFIG}"
          echo "======================="

          make mrproper >/dev/null 2>&1 || true

          echo "📝 Running defconfig..."
          eval "$CMD ${DEFCONFIG}"

          echo "⚡ Starting full build (VERBOSE MODE)..."
          eval "$CMD" 2>&1 | tee /tmp/build_output.log

          echo "✅ Build finished."
          echo "🔎 Checking which clang was actually invoked:"
          grep -m 5 "clang " /tmp/build_output.log | sed 's/^/  /' || echo "  (No clang invocations captured)"
          
          ls -l "${{ github.workspace }}/out/arch/arm64/boot/Image.gz" 2>/dev/null || echo "⚠️ Image.gz not found"
